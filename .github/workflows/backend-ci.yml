name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 13.60.163.228 >> ~/.ssh/known_hosts
          cat ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no -T ubuntu@13.60.163.228 << 'EOF'
          set -x  # Enable debugging

          # Kill any process running on port 4000 to avoid conflicts
          sudo lsof -t -i:4000 | xargs kill -9 || echo "No process using port 4000"

          # Navigate to the application directory
          cd /home/ubuntu/projects/random/Backend_Part_Nestjs

          # Pull the latest changes from the main branch
          git pull origin main

          # Clean npm cache before installing
          npm cache clean --force

          # Install dependencies (npm)
          npm install --verbose

          # Start the NestJS application in development mode
          npm run start -- --port 4000

          EOF

      - name: Reload Nginx
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no -T ubuntu@13.60.163.228 << 'EOF'
          sudo systemctl reload nginx
          EOF
