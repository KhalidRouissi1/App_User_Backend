name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no -T ubuntu@13.60.163.228 << 'EOF'
          # Ensure .ssh directory exists
          mkdir -p ~/.ssh
          # Add host to known hosts
          ssh-keyscan -H 13.60.163.228 >> ~/.ssh/known_hosts
          # Kill any process using port 4000
          sudo lsof -t -i:4000 | xargs kill -9 || echo "No process using port 4000"
          # Navigate to the project directory
          cd /home/ubuntu/projects/random/Backend_Part_Nestjs
          # Pull the latest code
          git pull origin main
          # Clean the npm cache and install dependencies
          npm cache clean --force
          npm install --verbose
          # Start the NestJS application
          npm run start -- --port 4000 &
          EOF

      - name: Reload Nginx
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no -T ubuntu@13.60.163.228 << 'EOF'
          sudo systemctl reload nginx
          EOF
