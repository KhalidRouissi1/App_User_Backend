name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          timeout 120s ssh -v -o ConnectTimeout=60 -o StrictHostKeyChecking=no -T ubuntu@13.60.163.228 << 'EOF'
          set -x  # Enable debugging
          mkdir -p ~/.ssh
          ssh-keyscan -H 13.60.163.228 >> ~/.ssh/known_hosts
          sudo lsof -t -i:4000 | xargs kill -9 || echo "No process using port 4000"
          cd /home/ubuntu/projects/random/Backend_Part_Nestjs
          git pull origin main
          npm cache clean --force
          npm install --verbose
          npm run start -- --port 4000
          EOF

      - name: Reload Nginx
        run: |
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no -T ubuntu@13.60.163.228 << 'EOF'
          sudo systemctl reload nginx
          EOF
